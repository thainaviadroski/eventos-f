<!-- Detalhes dos eventos  -->
<div class="evento-header">
	<h2> {{evento.id}} - {{evento.nome}} </h2>
	<p>{{evento.descricao}}</p>
	<p>
		<b>Data de Início:</b> {{evento.dtInicio | date: 'dd/MM/yyyy'}} - <b>Data de Fim:</b> {{evento.dtFim | date:
		'dd/MM/yyyy'}}
	</p>

</div>

<div class="wrapper-certificados">
	<div class="action">
		<button type="button" role="button" class="btn btn-primary"> <mat-icon>add</mat-icon> Novo Certificado</button>
	</div>

	<div class="list-certificados">
		<div class="cert-header">
			<p>ID</p>
			<p>Tipo</p>
			<p>Descrição</p>
			<p><b>Data de Emissão</b></p>
		</div>
		@for(certificado of certificados; track certificado.id) {
		<app-certificado-itens-component [certificado]="certificado"></app-certificado-itens-component>
		}
		<mat-paginator [length]="totalElements" [pageSize]="size" [pageSizeOptions]="[5, 10, 25, 100]"
			(page)="onPageChange($event)" aria-label="Selecionar página">
		</mat-paginator>
	</div>
</div>
