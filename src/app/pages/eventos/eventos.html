<div class="wrapper-action">
	<h3>Eventos:</h3>
	<button matButton="filled">
		<mat-icon>add</mat-icon>Novo Evento
	</button>
</div>

<div class="wrapper-list">
	@if(eventos.length !== 0) {
		<h3>Eventos Cadastrados:</h3>
	<div class="content">
		@for(evento of eventos; track evento.id) {
			<app-eventos-itens-component [evento]="evento"></app-eventos-itens-component>
		}
	</div>
	}

	@if(eventos.length === 0) {
	<p>Sem eventos cadastrados!</p>
	}
</div>
