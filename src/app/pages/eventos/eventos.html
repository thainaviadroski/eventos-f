<div class="wrapper-action">
	<h2>Eventos:</h2>
	<button matButton="filled" color="primary" (click)="openDialog()">
		<mat-icon>add</mat-icon>Novo Evento
	</button>
</div>

<div class="wrapper-list">
	@if(eventos.length !== 0) {
	<h3>Eventos Cadastrados:</h3>
	<div class="content">
		@for(evento of eventos; track evento.id) {
		<app-eventos-itens-component [evento]="evento" (viewDetail)="onDetail(evento.id)">
		</app-eventos-itens-component>
		}
	</div>
	}

	<mat-paginator [length]="totalElements" [pageSize]="size" [pageSizeOptions]="[5, 10, 25, 100]"
		(page)="onPageChange($event)" aria-label="Selecionar página">
	</mat-paginator>

	@if(eventos.length === 0) {
	<p>Sem eventos cadastrados!</p>
	}
</div>
